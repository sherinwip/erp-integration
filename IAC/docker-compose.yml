services:
  erp-integration-postgres:
    image: postgres:16
    container_name: erp-integration-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: erp_integration
    ports:
      - "5432:5432"
    volumes:
      - erp_integration_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d erp_integration"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  erp_integration_pgdata:
